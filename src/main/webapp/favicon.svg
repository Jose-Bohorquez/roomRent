<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#f59e0b"/>
  <!-- House shape -->
  <path d="M 50 20 L 80 50 L 75 50 L 75 75 Q 75 80 70 80 L 30 80 Q 25 80 25 75 L 25 50 L 20 50 Z" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <!-- Door -->
  <rect x="45" y="60" width="10" height="20" fill="#8b4513" rx="1"/>
  <!-- Door knob -->
  <circle cx="53" cy="70" r="1.5" fill="#ffd700"/>
  <!-- Left window -->
  <rect x="30" y="45" width="10" height="10" fill="#87ceeb" stroke="#ffffff" stroke-width="1"/>
  <line x1="35" y1="45" x2="35" y2="55" stroke="#ffffff" stroke-width="1"/>
  <line x1="30" y1="50" x2="40" y2="50" stroke="#ffffff" stroke-width="1"/>
  <!-- Right window -->
  <rect x="60" y="45" width="10" height="10" fill="#87ceeb" stroke="#ffffff" stroke-width="1"/>
  <line x1="65" y1="45" x2="65" y2="55" stroke="#ffffff" stroke-width="1"/>
  <line x1="60" y1="50" x2="70" y2="50" stroke="#ffffff" stroke-width="1"/>
</svg>
