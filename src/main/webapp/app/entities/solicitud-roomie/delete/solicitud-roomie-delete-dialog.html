@if (solicitudRoomie) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(solicitudRoomie.id!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="solicitudRoomieDeleteDialogHeading" jhiTranslate="entity.delete.title">
        Confirmar operación de borrado
      </h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error />
      <p
        id="jhi-delete-solicitudRoomie-heading"
        jhiTranslate="roomApp.solicitudRoomie.delete.question"
        [translateValues]="{ id: solicitudRoomie.id }"
      >
        ¿Seguro que quiere eliminar Solicitud Roomie {{ solicitudRoomie.id }}?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban" />&nbsp;<span jhiTranslate="entity.action.cancel">Cancelar</span>
      </button>

      <button id="jhi-confirm-delete-solicitudRoomie" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times" />&nbsp;<span jhiTranslate="entity.action.delete">Eliminar</span>
      </button>
    </div>
  </form>
}
