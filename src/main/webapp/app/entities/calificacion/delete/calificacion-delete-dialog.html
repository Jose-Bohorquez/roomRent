@if (calificacion) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(calificacion.id!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="calificacionDeleteDialogHeading" jhiTranslate="entity.delete.title">
        Confirmar operación de borrado
      </h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error />
      <p
        id="jhi-delete-calificacion-heading"
        jhiTranslate="roomApp.calificacion.delete.question"
        [translateValues]="{ id: calificacion.id }"
      >
        ¿Seguro que quiere eliminar Calificacion {{ calificacion.id }}?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban" />&nbsp;<span jhiTranslate="entity.action.cancel">Cancelar</span>
      </button>

      <button id="jhi-confirm-delete-calificacion" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times" />&nbsp;<span jhiTranslate="entity.action.delete">Eliminar</span>
      </button>
    </div>
  </form>
}
