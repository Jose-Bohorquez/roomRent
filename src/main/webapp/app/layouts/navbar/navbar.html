<nav class="rr-topbar">
  <div class="rr-topbar-inner">

    <!-- Izquierda: hamburger + marca (solo visible en mobile) -->
    <div class="rr-topbar-left">
      <button
        type="button"
        class="rr-hamburger"
        aria-label="Abrir menú"
        (click)="toggleSidebar()"
      >
        <fa-icon icon="bars" />
      </button>

      <a class="rr-topbar-brand d-lg-none" routerLink="/dashboard">
        <span class="rr-topbar-logo">🏠</span>
        <span class="rr-topbar-brand-text">Room<span>Rent</span></span>
      </a>
    </div>

    <!-- Derecha: portal + cuenta -->
    <div class="rr-topbar-right">

      <!-- Portal -->
      <a class="rr-topbar-portal-btn" href="/portal/" target="_self">
        <fa-icon icon="external-link-alt" />
        <span class="d-none d-sm-inline">Portal</span>
      </a>

      <!-- Cuenta -->
      @let accountRef = account();
      <div ngbDropdown placement="bottom-end" class="rr-account-wrap">
        <button type="button" class="rr-account-btn" ngbDropdownToggle>
          @if (!accountRef?.imageUrl) {
            <span class="rr-topbar-avatar">{{ userInitial() }}</span>
          } @else {
            <img [src]="accountRef!.imageUrl" class="rr-profile-img rounded-circle" alt="Avatar" />
          }
          <span class="rr-account-login d-none d-md-inline">{{ accountRef?.login ?? 'Cuenta' }}</span>
        </button>

        <ul class="dropdown-menu rr-account-menu" ngbDropdownMenu>
          @if (accountRef !== null) {
            <li class="rr-account-header">
              <span class="rr-account-header-name">{{ accountRef!.login }}</span>
              <span class="rr-account-header-role">{{ isAdmin() ? 'Administrador' : 'Usuario' }}</span>
            </li>
            <li><hr class="dropdown-divider rr-divider" /></li>
            <li>
              <a class="dropdown-item" routerLink="/account/settings" data-cy="settings">
                <fa-icon icon="wrench" [fixedWidth]="true" />
                Configuración
              </a>
            </li>
            <li>
              <a class="dropdown-item" routerLink="/account/password" data-cy="passwordItem">
                <fa-icon icon="lock" [fixedWidth]="true" />
                Cambiar contraseña
              </a>
            </li>
            <li><hr class="dropdown-divider rr-divider" /></li>
            <li>
              <a class="dropdown-item rr-logout-item" (click)="logout()" id="logout" data-cy="logout" style="cursor:pointer">
                <fa-icon icon="sign-out-alt" [fixedWidth]="true" />
                Cerrar sesión
              </a>
            </li>
          } @else {
            <li>
              <a class="dropdown-item" (click)="login()" id="login" data-cy="login" style="cursor:pointer">
                <fa-icon icon="sign-in-alt" [fixedWidth]="true" />
                Iniciar sesión
              </a>
            </li>
          }
        </ul>
      </div>

    </div>
  </div>
</nav>
