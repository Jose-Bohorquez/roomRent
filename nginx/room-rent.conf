# ═══════════════════════════════════════════════════════════════
# RoomRent — Nginx reverse proxy (producción optimizada)
#
# Características:
#   - Dominio canónico: https://room-rent.xyz (www → non-www 301)
#   - HTTP/2 + TLS 1.2/1.3
#   - Gzip sobre respuestas de texto (complementa compresión de Spring Boot)
#   - Cache larga (1 año + immutable) para JS/CSS con hash de contenido
#   - Cache 30 días para imágenes y assets binarios
#   - proxy_buffering off para binarios: elimina escrituras a disco
#   - Proxy buffers en memoria para JS/CSS: 8×64 k = 512 KB
#   - Headers de seguridad completos en cada location
#
# Instalar en servidor:
#   sudo cp nginx/room-rent.conf /etc/nginx/sites-available/room-rent.conf
#   sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════════

# ─── Bloque 1: HTTP → HTTPS non-www (canonical) ───────────────
# Cualquier petición HTTP (www o non-www) redirige a https://room-rent.xyz
server {
    listen 80;
    listen [::]:80;
    server_name room-rent.xyz www.room-rent.xyz;

    # Let's Encrypt ACME challenge (renovación automática de certificado)
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    # Todo lo demás → HTTPS non-www (dominio canónico)
    location / { return 301 https://room-rent.xyz$request_uri; }
}

# ─── Bloque 2: HTTPS www → HTTPS non-www (301 permanente) ─────
# Redirige https://www.room-rent.xyz a https://room-rent.xyz
# Requiere que certbot haya emitido certificado para www también.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.room-rent.xyz;

    ssl_certificate     /etc/letsencrypt/live/room-rent.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/room-rent.xyz/privkey.pem;

    # 301: permanente y cacheado por el navegador/bots
    return 301 https://room-rent.xyz$request_uri;
}

# ─── Bloque 3: HTTPS principal — room-rent.xyz ─────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name room-rent.xyz;

    # ── TLS ────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/room-rent.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/room-rent.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;       # TLSv1.3 define sus propios cipher suites
    ssl_session_cache   shared:SSL:10m;  # Sesiones TLS compartidas entre workers
    ssl_session_timeout 10m;

    # ── TCP / keepalive ─────────────────────────────────────────
    # sendfile: kernel pasa datos del disco al socket sin copia a userspace
    # tcp_nopush: acumula datos hasta llenar paquete TCP (reduce RTT)
    # tcp_nodelay: desactiva Nagle; envía inmediatamente (bueno para HTTP/2)
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;       # cierra conexión idle tras 65 s
    keepalive_requests  1000;     # max peticiones por conexión keep-alive

    # ── Límites de petición ──────────────────────────────────────
    client_max_body_size   20M;   # fotos de inmuebles
    client_body_timeout    30s;
    client_header_timeout  15s;
    send_timeout           30s;

    # ── Gzip ─────────────────────────────────────────────────────
    # Spring Boot ya comprime texto (server.compression.enabled=true en YAML).
    # Nginx actúa como capa complementaria:
    #   - gzip_proxied any: permite comprimir respuestas de proxy
    #   - Si Spring Boot envió Content-Encoding: gzip, Nginx NO re-comprime
    #   - gzip_vary on: añade "Vary: Accept-Encoding" para correcta cache CDN
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;           # balance CPU vs tamaño (1=rápido, 9=máximo)
    gzip_min_length   1024;        # no comprimir respuestas < 1 KB (overhead no vale)
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/manifest+json
        application/ld+json
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2
        application/font-woff
        application/font-woff2
        application/x-font-ttf
        application/vnd.ms-fontobject;

    # ── Proxy buffers para respuestas de texto ───────────────────
    # 8 × 64 k = 512 KB en RAM: cubre los chunks más grandes de Angular/Vite
    # (el mayor es 336 KB). Elimina el warning "upstream response is buffered
    # to a temporary file" para JS, CSS y JSON.
    # Los binarios grandes (imágenes, video) usarán proxy_buffering off.
    proxy_buffer_size          64k;
    proxy_buffers              8 64k;
    proxy_busy_buffers_size    128k;
    proxy_temp_file_write_size 256k;

    # ── Logs ────────────────────────────────────────────────────
    access_log /var/log/nginx/room-rent-access.log;
    error_log  /var/log/nginx/room-rent-error.log warn;

    # ════════════════════════════════════════════════════════════
    # Locations
    #
    # NOTA TÉCNICA — herencia de add_header en Nginx
    # Un bloque location que define cualquier add_header NO hereda los
    # add_header del bloque server padre (comportamiento documentado).
    # Por eso los headers de seguridad críticos (HSTS, nosniff) se
    # repiten en cada location que necesita su propio Cache-Control.
    # Ref: https://nginx.org/en/docs/http/ngx_http_headers_module.html
    # ════════════════════════════════════════════════════════════

    # ── Location 0: manifest PWA — MIME type application/manifest+json ─
    # Spring Boot no conoce .webmanifest y devuelve application/octet-stream.
    # Este bloque lo intercepta antes de Location / y fuerza el MIME correcto,
    # que es requerido por Chrome/Edge para mostrar el botón "Instalar".
    location ~* \.webmanifest$ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_hide_header  Cache-Control;
        proxy_hide_header  Pragma;
        proxy_hide_header  Expires;

        # more_set_headers reemplaza el header upstream en lugar de duplicarlo
        more_set_headers "Content-Type: application/manifest+json; charset=utf-8";

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff                                always;
        add_header Cache-Control             "public, max-age=86400"                always;
    }

    # ── Location 0b: Service Worker — nunca cacheado (browsers lo comparan en cada visita) ─
    # El Service Worker DEBE ser no-cache para que el navegador compruebe actualizaciones.
    # Si tuviera max-age>0, los usuarios quedarían con el SW viejo durante ese período.
    # Se declara antes de Location 1 (JS) para que sea la primera regex que matchee sw.js.
    location = /portal/sw.js {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_hide_header  Cache-Control;
        proxy_hide_header  Pragma;
        proxy_hide_header  Expires;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff                                always;
        add_header Cache-Control             "no-store"                             always;
        add_header Service-Worker-Allowed    "/portal/"                             always;
    }

    # ── Location 1: JS / CSS / fuentes — caché 1 año (immutable) ─
    # Justificación: tanto Angular (chunk-XXXXXXXX.js, styles-XXXXXXXX.css)
    # como Vite (index-XXXXXXXX.js, index-XXXXXXXX.css) generan nombres con
    # hash SHA del contenido. Si el contenido cambia → hash distinto → URL
    # distinta → el navegador descarga la versión nueva automáticamente.
    # Es seguro y correcto cachear con max-age=31536000 + immutable.
    #
    # proxy_hide_header elimina los tres headers de no-caché que Spring
    # Security añade a TODAS las respuestas (Cache-Control: no-store,
    # Pragma: no-cache, Expires: 0). Luego add_header pone el header correcto.
    # Este es el mecanismo estándar de Nginx para sustituir headers de upstream.
    location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Eliminar headers de Spring Security que impiden cualquier caché,
        # y los que Nginx va a poner él mismo para evitar duplicados.
        proxy_hide_header  Cache-Control;
        proxy_hide_header  Pragma;
        proxy_hide_header  Expires;
        proxy_hide_header  X-Content-Type-Options;  # Nginx lo re-emite abajo
        proxy_hide_header  Vary;                    # Nginx lo re-emite abajo

        # Seguridad (se repiten porque este location define su propio add_header)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff                                always;
        # Caché agresiva: 1 año + immutable (el navegador nunca revalida)
        add_header Cache-Control             "public, max-age=31536000, immutable"  always;
        # Vary indica a CDNs que la respuesta depende de Accept-Encoding
        add_header Vary                      "Accept-Encoding"                      always;
    }

    # ── Location 2: imágenes y video — caché 30 días, sin buffering ─
    # proxy_buffering off: los archivos binarios (3.5 MB city.png, 6.5 MB
    # bogota.mp4, etc.) fluyen directamente Spring Boot → Nginx → cliente
    # sin escribir a disco (/var/lib/nginx/proxy/). Elimina TODOS los
    # warnings "upstream response is buffered to a temporary file".
    #
    # Se usa max-age=2592000 (30 días) en lugar de 1 año porque algunos
    # assets de imagen no llevan hash en el nombre (favicon.ico, vite.svg).
    # Los que SÍ tienen hash (portal/assets/*.png, *.jpg) también se
    # benefician aunque con 30 días no se aprovecha al máximo el hash.
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|mp4|webm|ogg)$ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Sin buffering a disco para binarios grandes
        proxy_buffering off;

        proxy_hide_header  Cache-Control;
        proxy_hide_header  Pragma;
        proxy_hide_header  Expires;
        proxy_hide_header  X-Content-Type-Options;  # Nginx lo re-emite abajo

        # Seguridad (repetido)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff                                always;
        add_header Cache-Control             "public, max-age=2592000"              always;
    }

    # ── Location 3: health check — sin access log ────────────────
    location = /management/health {
        proxy_pass         http://127.0.0.1:8080/management/health;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        access_log         off;              # excluir healthchecks del log

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    }

    # ── Location 4: proxy general — API + Angular SPA + React portal ─
    # Recibe todo lo que no matchearon los bloques anteriores:
    # páginas HTML (/, /portal/, /portal/login, etc.) y llamadas /api/*.
    # Spring Boot gestiona el routing SPA vía SpaWebFilter.java.
    # Los headers de no-caché de Spring Security son correctos aquí:
    # el HTML de entrada no debe cachearse para que el navegador
    # descargue siempre el index.html con los JS/CSS actualizados.
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Headers de seguridad completos (este location es el que sirve HTML)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains"      always;
        add_header X-Frame-Options           SAMEORIGIN                                  always;
        add_header X-Content-Type-Options    nosniff                                     always;
        add_header X-XSS-Protection          "1; mode=block"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"           always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"  always;
    }
}
