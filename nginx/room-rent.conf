# ═══════════════════════════════════════════════════════════════
# RoomRent — Nginx reverse proxy
#
# Requisitos previos en el servidor:
#   sudo apt install nginx
#   sudo certbot --nginx -d room-rent.xyz -d www.room-rent.xyz
#
# Copiar este archivo a:
#   /etc/nginx/sites-available/room-rent.conf
# Activar con:
#   sudo ln -s /etc/nginx/sites-available/room-rent.conf \
#              /etc/nginx/sites-enabled/room-rent.conf
#   sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════════

# Redirige HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name room-rent.xyz www.room-rent.xyz;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS principal
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name room-rent.xyz www.room-rent.xyz;

    # Certificados Let's Encrypt (generados por certbot)
    ssl_certificate     /etc/letsencrypt/live/room-rent.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/room-rent.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Seguridad básica
    add_header X-Frame-Options        SAMEORIGIN   always;
    add_header X-Content-Type-Options nosniff      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Tamaño máximo de upload (fotos de inmuebles)
    client_max_body_size 20M;

    # ── Proxy al Spring Boot (API + Angular admin + React portal) ──
    # Spring Boot escucha en 127.0.0.1:8080 (expuesto solo localmente por docker-compose)
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Caché de archivos estáticos servidos por Spring Boot
        location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf|eot)$ {
            proxy_pass http://127.0.0.1:8080;
            expires    30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Health check endpoint (no requiere auth) ──
    location /management/health {
        proxy_pass http://127.0.0.1:8080/management/health;
        access_log off;
    }

    # Logs
    access_log /var/log/nginx/room-rent-access.log;
    error_log  /var/log/nginx/room-rent-error.log warn;
}
